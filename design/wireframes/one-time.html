<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>One-time detail — Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --background: oklch(0.98 0.004 200);
    --foreground: oklch(0.28 0.005 200);
    --card: oklch(1 0 0);
    --card-foreground: oklch(0.28 0.005 200);
    --primary: oklch(0.20 0.005 200);
    --primary-foreground: oklch(0.985 0 0);
    --secondary: oklch(0.96 0.002 200);
    --muted: oklch(0.96 0.002 200);
    --muted-foreground: oklch(0.55 0.01 200);
    --accent: oklch(0.96 0.002 200);
    --border: oklch(0.92 0.002 200);
    --input: oklch(0.92 0.002 200);
    --ring: oklch(0.80 0.01 200);
    --momentum: oklch(0.62 0.12 154);
    --caution: oklch(0.68 0.14 72);
    --missed: oklch(0.62 0.17 27);
    --radius: 0.75rem;
    --radius-sm: calc(var(--radius) * 0.6);
    --radius-md: calc(var(--radius) * 0.8);
    --radius-lg: var(--radius);
    --font-heading: "Sora", system-ui, sans-serif;
    --font-sans: "DM Sans", system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --background: oklch(0.18 0.006 200);
    --foreground: oklch(0.86 0.006 200);
    --card: oklch(0.22 0.006 200);
    --card-foreground: oklch(0.86 0.006 200);
    --primary: oklch(0.88 0.008 200);
    --primary-foreground: oklch(0.18 0.006 200);
    --secondary: oklch(0.26 0.006 200);
    --muted: oklch(0.26 0.006 200);
    --muted-foreground: oklch(0.62 0.01 200);
    --accent: oklch(0.26 0.006 200);
    --border: oklch(1 0 0 / 0.07);
    --input: oklch(1 0 0 / 0.09);
    --ring: oklch(0.40 0.01 200);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100dvh;
    transition: background 0.2s ease, color 0.2s ease;
  }
  body { display: flex; justify-content: center; }

  .wf-controls {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 4px;
    font-size: 11px;
    flex-wrap: wrap;
    max-width: 240px;
  }
  .wf-controls button {
    background: transparent;
    border: 0;
    color: var(--muted-foreground);
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font: inherit;
  }
  .wf-controls button[aria-pressed="true"] {
    background: var(--background);
    color: var(--foreground);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  .frame {
    position: relative;
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--background);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  .page-header {
    position: sticky;
    top: 0;
    z-index: 50;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    background: color-mix(in oklch, var(--background) 80%, transparent);
    backdrop-filter: blur(12px);
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: transparent;
    border: 0;
    color: var(--foreground);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { background: var(--accent); }
  .icon-btn svg { width: 20px; height: 20px; }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 20px 20px 112px;
  }

  .day-bar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    padding: 0 4px 4px;
  }
  .day-bar-text { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .day-title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--foreground);
    line-height: 1.2;
  }
  .day-coach {
    font-size: 13px;
    color: var(--muted-foreground);
    letter-spacing: 0.01em;
    font-weight: 500;
    line-height: 1.4;
  }
  .day-desc { font-size: 13px; color: color-mix(in oklch, var(--muted-foreground) 80%, transparent); line-height: 1.4; }

  .btn-log {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    border: 1.5px solid color-mix(in oklch, var(--muted-foreground) 35%, transparent);
    background: transparent;
    color: var(--muted-foreground);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .btn-log svg { width: 15px; height: 15px; }
  .btn-log:hover { border-color: var(--foreground); color: var(--foreground); }

  /* Adaptive hero card (replaces Momentum/Started + The Arc for one-time) */
  .hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .hero-top { display: flex; align-items: center; gap: 8px; }
  .hero-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted-foreground);
  }
  .hero-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .hero-main { display: flex; flex-direction: column; gap: 4px; }
  .hero-value {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--foreground);
  }
  .hero-sub { font-size: 13px; color: var(--muted-foreground); font-weight: 500; }
  .hero-note {
    margin-top: 2px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted-foreground);
    line-height: 1.45;
  }

  /* State accents */
  .hero.done .hero-label { color: var(--momentum); }
  .hero.done .hero-icon { color: var(--momentum); }
  .hero.overdue .hero-label { color: var(--caution); }
  .hero.overdue .hero-icon { color: var(--caution); }

  /* Optional metadata row */
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    padding: 0 4px;
    font-size: 12px;
    color: var(--muted-foreground);
  }
  .meta-row .dot { color: color-mix(in oklch, var(--muted-foreground) 50%, transparent); }

  .fab {
    position: absolute;
    right: 20px;
    bottom: calc(64px + env(safe-area-inset-bottom) + 18px);
    width: 52px;
    height: 52px;
    border-radius: 999px;
    background: var(--foreground);
    color: var(--background);
    border: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 24px oklch(0 0 0 / 0.18), 0 2px 6px oklch(0 0 0 / 0.1);
    z-index: 40;
  }
  .fab svg { width: 22px; height: 22px; }

  .bottom-nav {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 64px;
    padding-bottom: env(safe-area-inset-bottom);
    border-top: 1px solid var(--border);
    background: color-mix(in oklch, var(--background) 80%, transparent);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-around;
  }
  .nav-item {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    min-width: 64px;
    min-height: 48px;
    color: var(--muted-foreground);
    background: transparent;
    border: 0;
    cursor: pointer;
    font: inherit;
  }
  .nav-item svg { width: 20px; height: 20px; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
  .nav-item.active { color: var(--foreground); }

  .embedded .wf-controls { display: none; }
</style>
</head>
<body>
  <div class="wf-controls" role="group" aria-label="Wireframe controls">
    <button type="button" data-set-state="upcoming" aria-pressed="true">Upcoming</button>
    <button type="button" data-set-state="done" aria-pressed="false">Done</button>
    <button type="button" data-set-state="overdue" aria-pressed="false">Past due</button>
    <button type="button" data-set-theme="light" aria-pressed="true">Light</button>
    <button type="button" data-set-theme="dark" aria-pressed="false">Dark</button>
  </div>

  <div class="frame">
    <header class="page-header">
      <button class="icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <button class="icon-btn" type="button" aria-label="More options">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
      </button>
    </header>

    <main class="content">
      <div class="day-bar">
        <div class="day-bar-text">
          <h2 class="day-title">Eat the cake</h2>
          <span class="day-coach">One-time · Jun 14, 2026</span>
          <span class="day-desc">Birthday treat</span>
        </div>
        <button class="btn-log" type="button" aria-label="Log Eat the cake">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>
      </div>

      <!-- Adaptive hero card -->
      <div class="hero upcoming" id="hero">
        <div class="hero-top">
          <span class="hero-icon" id="hero-icon" hidden></span>
          <span class="hero-label" id="hero-label">Upcoming</span>
        </div>
        <div class="hero-main">
          <span class="hero-value" id="hero-value">In 5 days</span>
          <span class="hero-sub" id="hero-sub">Jun 14, 2026 · 07:00</span>
        </div>
        <p class="hero-note" id="hero-note" hidden></p>
      </div>

      <!-- Metadata row (category + schedule, no create date) -->
      <div class="meta-row">
        <span>Well-being</span>
        <span class="dot">·</span>
        <span>07:00</span>
      </div>
    </main>

    <button class="fab" type="button" aria-label="Talk to Strive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>
    </button>

    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-item" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 13a2 2 0 0 0 2-2V7a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0V4a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0v-4a2 2 0 0 1 2-2"/></svg><span class="nav-label">Rhythm</span></button>
      <button class="nav-item active" type="button" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg><span class="nav-label">Rituals</span></button>
      <button class="nav-item" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="nav-label">Circles</span></button>
    </nav>
  </div>

<script>
  const root = document.documentElement;
  if (window.parent !== window || new URLSearchParams(location.search).has("clean")) {
    root.classList.add("embedded");
  }
  const initial = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  root.dataset.theme = initial;
  document.querySelectorAll(".wf-controls [data-set-theme]").forEach((btn) => {
    btn.setAttribute("aria-pressed", btn.dataset.setTheme === initial ? "true" : "false");
    btn.addEventListener("click", () => {
      root.dataset.theme = btn.dataset.setTheme;
      document.querySelectorAll(".wf-controls [data-set-theme]").forEach((b) =>
        b.setAttribute("aria-pressed", b.dataset.setTheme === btn.dataset.setTheme ? "true" : "false"));
    });
  });

  const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
  const STATES = {
    upcoming: {
      label: "Upcoming", value: "In 5 days", sub: "Jun 14, 2026 · 07:00", icon: null, note: null,
    },
    done: {
      label: "Done", value: "Logged Jun 12", sub: "2 days early", icon: CHECK, note: null,
    },
    overdue: {
      label: "Past due", value: "Due Jun 14", sub: "3 days ago", icon: null,
      note: "Still relevant? Log it or reschedule the date.",
    },
  };
  const hero = document.getElementById("hero");
  const heroIcon = document.getElementById("hero-icon");
  const heroLabel = document.getElementById("hero-label");
  const heroValue = document.getElementById("hero-value");
  const heroSub = document.getElementById("hero-sub");
  const heroNote = document.getElementById("hero-note");
  function setState(state) {
    const s = STATES[state];
    hero.className = "hero " + state;
    heroLabel.textContent = s.label;
    heroValue.textContent = s.value;
    heroSub.textContent = s.sub;
    if (s.icon) { heroIcon.innerHTML = s.icon; heroIcon.hidden = false; } else { heroIcon.hidden = true; }
    if (s.note) { heroNote.textContent = s.note; heroNote.hidden = false; } else { heroNote.hidden = true; }
  }
  document.querySelectorAll(".wf-controls [data-set-state]").forEach((btn) => {
    btn.addEventListener("click", () => {
      setState(btn.dataset.setState);
      document.querySelectorAll(".wf-controls [data-set-state]").forEach((b) =>
        b.setAttribute("aria-pressed", b.dataset.setState === btn.dataset.setState ? "true" : "false"));
    });
  });
  setState("upcoming");
</script>
</body>
</html>
