<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Circle detail — Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --background: oklch(0.98 0.004 200);
    --foreground: oklch(0.28 0.005 200);
    --card: oklch(1 0 0);
    --card-foreground: oklch(0.28 0.005 200);
    --primary: oklch(0.20 0.005 200);
    --primary-foreground: oklch(0.985 0 0);
    --secondary: oklch(0.96 0.002 200);
    --muted: oklch(0.96 0.002 200);
    --muted-foreground: oklch(0.55 0.01 200);
    --accent: oklch(0.96 0.002 200);
    --border: oklch(0.92 0.002 200);
    --input: oklch(0.92 0.002 200);
    --ring: oklch(0.80 0.01 200);
    --momentum: oklch(0.62 0.12 154);
    --caution: oklch(0.68 0.14 72);
    --missed: oklch(0.62 0.17 27);
    --radius: 0.75rem;
    --radius-sm: calc(var(--radius) * 0.6);
    --radius-md: calc(var(--radius) * 0.8);
    --radius-lg: var(--radius);
    --radius-xl: calc(var(--radius) * 1.4);
    --radius-2xl: calc(var(--radius) * 1.8);
    --font-heading: "Sora", system-ui, sans-serif;
    --font-sans: "DM Sans", system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --background: oklch(0.18 0.006 200);
    --foreground: oklch(0.86 0.006 200);
    --card: oklch(0.22 0.006 200);
    --card-foreground: oklch(0.86 0.006 200);
    --primary: oklch(0.88 0.008 200);
    --primary-foreground: oklch(0.18 0.006 200);
    --secondary: oklch(0.26 0.006 200);
    --muted: oklch(0.26 0.006 200);
    --muted-foreground: oklch(0.62 0.01 200);
    --accent: oklch(0.26 0.006 200);
    --border: oklch(1 0 0 / 0.07);
    --input: oklch(1 0 0 / 0.09);
    --ring: oklch(0.40 0.01 200);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100dvh;
    transition: background 0.2s ease, color 0.2s ease;
  }
  body { display: flex; justify-content: center; padding: 0; }

  /* Wireframe theme switcher */
  .wf-controls {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 4px;
    font-size: 11px;
  }
  .wf-controls button {
    background: transparent;
    border: 0;
    color: var(--muted-foreground);
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font: inherit;
  }
  .wf-controls button[aria-pressed="true"] {
    background: var(--background);
    color: var(--foreground);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  /* Mobile-style frame */
  .frame {
    position: relative;
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--background);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* App header (detail page — back + more) */
  .page-header {
    position: sticky;
    top: 0;
    z-index: 50;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    background: color-mix(in oklch, var(--background) 80%, transparent);
    backdrop-filter: blur(12px);
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: transparent;
    border: 0;
    color: var(--foreground);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { background: var(--accent); }
  .icon-btn svg { width: 20px; height: 20px; }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 18px 20px 112px;
  }

  /* Hero (circle identity) */
  .hero {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 0 4px 4px;
  }
  .hero-identity {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hero-title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--foreground);
    line-height: 1.2;
  }
  /* Optional circle description (e.g., "Let's prepare for this marathon guys!")
     Hidden when circles.description is null. Single-line truncate with ellipsis
     to keep the hero compact even with longer descriptions. */
  .hero-description {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--muted-foreground);
    line-height: 1.4;
    letter-spacing: 0.005em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .members-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .avatar-stack {
    display: inline-flex;
    align-items: center;
  }
  .stack-avatar {
    width: 30px;
    height: 30px;
    border-radius: 999px;
    background: var(--accent);
    border: 2px solid var(--card);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0;
    color: var(--foreground);
    margin-left: -8px;
  }
  .stack-avatar:first-child { margin-left: 0; }
  .members-count {
    font-size: 12.5px;
    color: var(--muted-foreground);
    letter-spacing: 0.005em;
  }
  .invite-link {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px dashed color-mix(in oklch, var(--muted-foreground) 30%, transparent);
    background: transparent;
    color: var(--muted-foreground);
    cursor: pointer;
    font: inherit;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 11.5px;
    letter-spacing: 0.01em;
  }
  .invite-link:hover { color: var(--foreground); border-color: color-mix(in oklch, var(--foreground) 30%, transparent); }
  .invite-link svg { width: 11px; height: 11px; }

  /* Section */
  .section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted-foreground);
    padding: 0 4px 2px;
  }
  /* Section header with collapsible affordance */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 0 4px;
  }
  .section-head .section-label { padding: 0 0 2px; }
  .collapse-btn {
    width: 24px;
    height: 24px;
    border-radius: 999px;
    border: 0;
    background: transparent;
    color: var(--muted-foreground);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
  }
  .collapse-btn:hover { color: var(--foreground); background: var(--accent); }
  .collapse-btn svg {
    width: 14px;
    height: 14px;
    transition: transform 0.2s;
  }
  .collapse-btn[aria-expanded="false"] svg { transform: rotate(-90deg); }

  /* Grouped list (used for both feed + shared rituals) */
  .grouped-list {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    overflow: hidden;
  }
  .feed-row,
  .shared-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .feed-row:last-child,
  .shared-row:last-child { border-bottom: 0; }

  /* Feed row (weekly summary per member per ritual) */
  .feed-avatar {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    background: var(--accent);
    color: var(--foreground);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
  }
  .feed-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .feed-name {
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 13.5px;
    letter-spacing: -0.005em;
    color: var(--foreground);
    line-height: 1.25;
  }
  .feed-ritual {
    font-size: 11px;
    color: var(--muted-foreground);
    letter-spacing: 0.02em;
  }
  .feed-score {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.02em;
    color: var(--foreground);
    flex-shrink: 0;
  }
  .feed-score .denom {
    font-family: var(--font-sans);
    color: var(--muted-foreground);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 999px;
    flex-shrink: 0;
    display: inline-block;
    background: var(--muted-foreground);
  }
  .status-dot.on-track { background: var(--momentum); }
  .status-dot.steady   { background: var(--caution); }
  .status-dot.resting  { background: var(--muted-foreground); }
  .nudge-btn {
    width: 30px;
    height: 30px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted-foreground);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
  }
  .nudge-btn svg { width: 14px; height: 14px; }
  .nudge-btn:hover {
    border-color: color-mix(in oklch, var(--foreground) 35%, transparent);
    color: var(--foreground);
    background: var(--accent);
  }
  /*
    POST-TAP STATE (for dev):
    After tap, the nudge button switches to .sent state — kept visible (not removed)
    to confirm the action landed, but muted to prevent spam taps. Rate-limited at
    DB level via UNIQUE (from_user, to_user, ritual_id, week_of) on circle_nudges.
  */
  .nudge-btn.sent {
    color: color-mix(in oklch, var(--muted-foreground) 60%, transparent);
    border-color: color-mix(in oklch, var(--border) 50%, transparent);
    background: var(--accent);
    cursor: default;
  }
  /* Self row marker (replaces the nudge slot for visual balance) */
  .self-marker {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 500;
    color: color-mix(in oklch, var(--muted-foreground) 85%, transparent);
    letter-spacing: 0.03em;
    flex-shrink: 0;
    text-align: right;
    min-width: 30px;
  }

  /* Shared ritual row (toggle) */
  .shared-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-md);
    background: var(--accent);
    color: var(--muted-foreground);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .shared-icon svg { width: 17px; height: 17px; }
  .shared-name {
    flex: 1;
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.005em;
    color: var(--foreground);
  }
  .toggle {
    width: 42px;
    height: 25px;
    background: color-mix(in oklch, var(--muted-foreground) 25%, transparent);
    border-radius: 999px;
    border: 0;
    cursor: pointer;
    padding: 3px;
    display: inline-flex;
    align-items: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: "";
    width: 19px;
    height: 19px;
    border-radius: 999px;
    background: var(--card);
    box-shadow: 0 1px 2px oklch(0 0 0 / 0.18);
    transition: transform 0.2s;
  }
  .toggle.on { background: var(--foreground); }
  .toggle.on::after { transform: translateX(17px); }

  /* Floating action button — Strive AI */
  .fab {
    position: absolute;
    right: 20px;
    bottom: calc(64px + env(safe-area-inset-bottom) + 18px);
    width: 52px;
    height: 52px;
    border-radius: 999px;
    background: var(--foreground);
    color: var(--background);
    border: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 24px oklch(0 0 0 / 0.18), 0 2px 6px oklch(0 0 0 / 0.1);
    z-index: 40;
  }
  .fab svg { width: 22px; height: 22px; }

  /* Hide wireframe chrome when embedded */
  .embedded .wf-controls { display: none; }

  /* Bottom nav */
  .bottom-nav {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 64px;
    padding-bottom: env(safe-area-inset-bottom);
    border-top: 1px solid var(--border);
    background: color-mix(in oklch, var(--background) 80%, transparent);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-around;
  }
  .nav-item {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    min-width: 64px;
    min-height: 48px;
    color: var(--muted-foreground);
    background: transparent;
    border: 0;
    cursor: pointer;
    font: inherit;
    text-decoration: none;
  }
  .nav-item svg { width: 20px; height: 20px; }
  .nav-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .nav-item.active { color: var(--foreground); }
</style>
</head>
<body>
  <div class="wf-controls" role="group" aria-label="Wireframe theme">
    <button type="button" data-set-theme="light" aria-pressed="true">Light</button>
    <button type="button" data-set-theme="dark" aria-pressed="false">Dark</button>
  </div>

  <div class="frame">
    <header class="page-header">
      <button class="icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <!--
        ··· MENU CONTENTS (for dev — tap opens action sheet):
        - Rename circle (owner only)
        - Edit members (owner: kick / promote ; member: just see list)
        - Copy invite link
        - Leave circle (members) / Delete circle (owner)
        Order from least to most destructive.
      -->
      <button class="icon-btn" type="button" aria-label="More options">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5" cy="12" r="1"/>
          <circle cx="12" cy="12" r="1"/>
          <circle cx="19" cy="12" r="1"/>
        </svg>
      </button>
    </header>

    <main class="content">
      <!--
        Hero zone: circle identity. The description maps to circles.description,
        a TEXT NULL column that we need to ADD to the schema in Phase 4
        (current circles table only has id / name / owner_id / created_at).
        Set on creation via the "+ Add a note" link in circles-create.html.
        When null, render only the title — skip the description line entirely.
      -->
      <div class="hero">
        <div class="hero-identity">
          <h2 class="hero-title">Running crew</h2>
          <p class="hero-description">Let's prepare for this marathon guys!</p>
        </div>
        <div class="members-row">
          <div class="avatar-stack" aria-label="3 members">
            <span class="stack-avatar">P</span>
            <span class="stack-avatar">S</span>
            <span class="stack-avatar">L</span>
          </div>
          <span class="members-count">3 members</span>
          <!--
            INVITE = share link, not friends search.
            Tap = POST /circles/:id/invitations { expires_in_days=7, max_uses=8 },
            receives a token, then opens native share sheet with URL /i/:token.
            Recipient hits the URL:
              - if logged in: INSERT circle_members + UPDATE invitation.used_count
              - if not logged: signup flow → same as above on completion
            No friends/contacts UI needed. The whole invitation flow lives in
            circle_invitations table (token, expires_at, max_uses, used_count).
          -->
          <button class="invite-link" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            Invite
          </button>
        </div>
      </div>

      <!--
        WEEKLY FEED structure (for dev).
        Current wireframe = one row per member, single shared ritual ("Morning run").
        When members share MULTIPLE rituals each, the recommended structure is to
        GROUP BY RITUAL rather than by member:

          MORNING RUN
            Pierre · 4/5 ● [nudge]
            Sarah  · 2/5 ● [sent]
            You    · 5/5 ●  you

          MORNING MEDITATION
            Pierre · 6/7 ● [nudge]
            You    · 7/7 ●  you

        Rationale: a circle is built around shared activities. Grouping by ritual
        matches the mental model ("how are we all doing on running this week?")
        and naturally hides members who haven't opted into that ritual.
      -->
      <section class="section">
        <span class="section-label">Week of May 11</span>
        <div class="grouped-list" aria-label="Weekly progress of circle members">
          <div class="feed-row">
            <div class="feed-avatar">P</div>
            <div class="feed-info">
              <span class="feed-name">Pierre</span>
              <span class="feed-ritual">Morning run</span>
            </div>
            <span class="feed-score">4<span class="denom">/5</span></span>
            <span class="status-dot on-track"></span>
            <button class="nudge-btn" type="button" aria-label="Send a nudge to Pierre">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M11 14h2a2 2 0 1 0 0-4h-3c-.6 0-1.1.2-1.4.6L3 16"/>
                <path d="m7 20 1.6-1.4c.3-.4.8-.6 1.4-.6h4c1.1 0 2.1-.4 2.8-1.2l4.6-4.4a2 2 0 0 0-2.75-2.91l-4.2 3.9"/>
                <path d="m2 15 6 6"/>
                <path d="M19.5 8.5c.7-.7 1.5-1.6 1.5-2.7A2.73 2.73 0 0 0 16 4a2.78 2.78 0 0 0-5 1.8c0 1.2.8 2 1.5 2.8L16 12Z"/>
              </svg>
            </button>
          </div>

          <div class="feed-row">
            <div class="feed-avatar">S</div>
            <div class="feed-info">
              <span class="feed-name">Sarah</span>
              <span class="feed-ritual">Morning run</span>
            </div>
            <span class="feed-score">2<span class="denom">/5</span></span>
            <span class="status-dot steady"></span>
            <!-- Sarah's nudge shown in POST-TAP "sent" state (dev reference) -->
            <button class="nudge-btn sent" type="button" aria-label="Nudge already sent to Sarah" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M11 14h2a2 2 0 1 0 0-4h-3c-.6 0-1.1.2-1.4.6L3 16"/>
                <path d="m7 20 1.6-1.4c.3-.4.8-.6 1.4-.6h4c1.1 0 2.1-.4 2.8-1.2l4.6-4.4a2 2 0 0 0-2.75-2.91l-4.2 3.9"/>
                <path d="m2 15 6 6"/>
                <path d="M19.5 8.5c.7-.7 1.5-1.6 1.5-2.7A2.73 2.73 0 0 0 16 4a2.78 2.78 0 0 0-5 1.8c0 1.2.8 2 1.5 2.8L16 12Z"/>
              </svg>
            </button>
          </div>

          <div class="feed-row">
            <div class="feed-avatar">L</div>
            <div class="feed-info">
              <span class="feed-name">You</span>
              <span class="feed-ritual">Morning run</span>
            </div>
            <span class="feed-score">5<span class="denom">/5</span></span>
            <span class="status-dot on-track"></span>
            <!-- Self row marker — no nudge possible on yourself, label balances the right side -->
            <span class="self-marker">you</span>
          </div>
        </div>
      </section>

      <!--
        SHARED RITUALS section.
        - PRIVACY: this list is PRIVATE to the current user. It's their control
          panel for "what do I expose in this circle". Other members never see
          this section for someone else. Other members only see, in the weekly
          feed above, the rituals you opted in.
        - COLLAPSIBLE: this section is collapsible (chevron in section header).
          Default = expanded for the wireframe. For users with many rituals
          (8+), default state may switch to collapsed so the weekly feed stays
          the primary focus.
      -->
      <section class="section">
        <div class="section-head">
          <span class="section-label">My shared rituals</span>
          <button class="collapse-btn" type="button" aria-label="Collapse section" aria-expanded="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6"/>
            </svg>
          </button>
        </div>
        <div class="grouped-list" aria-label="Which of your rituals are visible to this circle">
          <div class="shared-row">
            <div class="shared-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">

<script>
  const root = document.documentElement;
  const isEmbedded = window.parent !== window;
  const isClean = new URLSearchParams(window.location.search).has("clean");
  if (isEmbedded || isClean) root.classList.add("embedded");
  const initial = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  root.dataset.theme = initial;
  document.querySelectorAll(".wf-controls [data-set-theme]").forEach((btn) => {
    btn.setAttribute("aria-pressed", btn.dataset.setTheme === initial ? "true" : "false");
    btn.addEventListener("click", () => {
      const t = btn.dataset.setTheme;
      root.dataset.theme = t;
      document.querySelectorAll(".wf-controls [data-set-theme]").forEach((b) => {
        b.setAttribute("aria-pressed", b.dataset.setTheme === t ? "true" : "false");
      });
    });
  });
</script>
