<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Archived rituals — Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --background: oklch(0.98 0.004 200);
    --foreground: oklch(0.28 0.005 200);
    --card: oklch(1 0 0);
    --card-foreground: oklch(0.28 0.005 200);
    --primary: oklch(0.20 0.005 200);
    --primary-foreground: oklch(0.985 0 0);
    --secondary: oklch(0.96 0.002 200);
    --muted: oklch(0.96 0.002 200);
    --muted-foreground: oklch(0.55 0.01 200);
    --accent: oklch(0.96 0.002 200);
    --border: oklch(0.92 0.002 200);
    --input: oklch(0.92 0.002 200);
    --ring: oklch(0.80 0.01 200);
    --momentum: oklch(0.62 0.12 154);
    --caution: oklch(0.68 0.14 72);
    --missed: oklch(0.62 0.17 27);
    --radius: 0.75rem;
    --radius-sm: calc(var(--radius) * 0.6);
    --radius-md: calc(var(--radius) * 0.8);
    --radius-lg: var(--radius);
    --radius-xl: calc(var(--radius) * 1.4);
    --radius-2xl: calc(var(--radius) * 1.8);
    --font-heading: "Sora", system-ui, sans-serif;
    --font-sans: "DM Sans", system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --background: oklch(0.18 0.006 200);
    --foreground: oklch(0.86 0.006 200);
    --card: oklch(0.22 0.006 200);
    --card-foreground: oklch(0.86 0.006 200);
    --primary: oklch(0.88 0.008 200);
    --primary-foreground: oklch(0.18 0.006 200);
    --secondary: oklch(0.26 0.006 200);
    --muted: oklch(0.26 0.006 200);
    --muted-foreground: oklch(0.62 0.01 200);
    --accent: oklch(0.26 0.006 200);
    --border: oklch(1 0 0 / 0.07);
    --input: oklch(1 0 0 / 0.09);
    --ring: oklch(0.40 0.01 200);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100dvh;
    transition: background 0.2s ease, color 0.2s ease;
  }
  body { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; padding: 0; }

  .wf-controls {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    display: flex; gap: 4px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 4px; font-size: 11px;
  }
  .wf-controls button {
    background: transparent; border: 0; color: var(--muted-foreground);
    padding: 4px 8px; border-radius: var(--radius-sm); cursor: pointer; font: inherit;
  }
  .wf-controls button[aria-pressed="true"] {
    background: var(--background); color: var(--foreground);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  .frame {
    position: relative; width: 100%; max-width: 420px; min-height: 100dvh;
    display: flex; flex-direction: column; background: var(--background);
    border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  }

  /* Sub-page header: back + title (no brand/avatar, this is a drill-in) */
  .page-header {
    position: sticky; top: 0; z-index: 50; height: 56px;
    display: flex; align-items: center; gap: 6px; padding: 0 12px;
    background: color-mix(in oklch, var(--background) 80%, transparent);
    backdrop-filter: blur(12px);
  }
  .back-btn {
    width: 44px; height: 44px; border-radius: 999px; background: transparent; border: 0;
    color: var(--foreground); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .back-btn:hover { background: var(--accent); }
  .back-btn svg { width: 20px; height: 20px; }
  .header-title {
    font-family: var(--font-heading); font-weight: 700; font-size: 18px;
    letter-spacing: -0.01em; color: var(--foreground);
  }

  .content {
    flex: 1; display: flex; flex-direction: column; gap: 8px; padding: 18px 20px 112px;
  }

  /* Archived row: simpler than the active card — no momentum, a Restore pill */
  .archived-row {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-xl); padding: 10px 12px 10px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .archived-main {
    flex: 1; min-width: 0; display: flex; align-items: center; gap: 12px;
    background: transparent; border: 0; cursor: pointer; text-align: left; color: inherit; font: inherit;
  }
  .ritual-icon {
    width: 36px; height: 36px; border-radius: var(--radius-md);
    background: var(--accent); color: var(--muted-foreground);
    display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 18px; line-height: 1;
  }
  .ritual-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .ritual-name {
    font-family: var(--font-heading); font-weight: 600; font-size: 14px;
    letter-spacing: -0.01em; color: var(--foreground); line-height: 1.25;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ritual-meta {
    font-size: 11px; color: var(--muted-foreground); letter-spacing: 0.02em;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .meta-sep { color: color-mix(in oklch, var(--muted-foreground) 50%, transparent); }

  .restore-btn {
    flex-shrink: 0; border: 1px solid var(--border); background: transparent;
    border-radius: 999px; padding: 8px 14px; min-height: 36px;
    font: inherit; font-size: 12px; font-weight: 600; color: var(--foreground);
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .restore-btn:hover { background: color-mix(in oklch, var(--foreground) 5%, transparent); }
  .restore-btn svg { width: 13px; height: 13px; }

  /* Empty state */
  .empty {
    margin-top: 64px; text-align: center; color: var(--muted-foreground); font-size: 13px;
  }

  .caption {
    width: 100%; max-width: 420px; text-align: center; color: var(--muted-foreground);
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin: 8px 0 -8px;
  }
  /* Floating action button — Strive AI (rendered by the app layout) */
  .fab {
    position: absolute; right: 20px;
    bottom: calc(64px + env(safe-area-inset-bottom) + 18px);
    width: 52px; height: 52px; border-radius: 999px;
    background: var(--foreground); color: var(--background); border: 0;
    display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 8px 24px oklch(0 0 0 / 0.18), 0 2px 6px oklch(0 0 0 / 0.1); z-index: 40;
  }
  .fab svg { width: 22px; height: 22px; }

  /* Bottom nav (rendered by the app layout) */
  .bottom-nav {
    position: absolute; left: 0; right: 0; bottom: 0; height: 64px;
    padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid var(--border);
    background: color-mix(in oklch, var(--background) 80%, transparent);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-around;
  }
  .nav-item {
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; min-width: 64px; min-height: 48px; color: var(--muted-foreground);
    background: transparent; border: 0; cursor: pointer; font: inherit; text-decoration: none;
  }
  .nav-item svg { width: 20px; height: 20px; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
  .nav-item.active { color: var(--foreground); }

  .embedded .wf-controls { display: none; }
</style>
</head>
<body>
  <div class="wf-controls" role="group" aria-label="Wireframe theme">
    <button type="button" data-set-theme="light" aria-pressed="true">Light</button>
    <button type="button" data-set-theme="dark" aria-pressed="false">Dark</button>
  </div>

  <!-- STATE A — populated list -->
  <div class="frame">
    <header class="page-header">
      <button class="back-btn" type="button" aria-label="Back to rituals">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>

      <span class="header-title">Archived rituals</span>

    <main class="content">

      <div class="archived-row">

          <span class="ritual-icon">🏃</span>
          <span class="ritual-info">
            <span class="ritual-name">Morning run</span>

        <button class="restore-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
          Restore
        </button>
      </div>

      <div class="archived-row">

          </span>
        </button>
        <button class="restore-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
          Restore
        </button>
      </div>

      <div class="archived-row">
        <button class="archived-main" type="button">
          <span class="ritual-icon">📓</span>
          <span class="ritual-info">

        <button class="restore-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
          Restore

      <div class="archived-row">

            <span class="ritual-name">Digital sunset</span>
            <span class="ritual-meta">Balance <span class="meta-sep">·</span> Archived 28 Apr 2026</span>
          </span>
        </button>
        <button class="restore-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
          Restore
        </button>
      </div>

      <div class="archived-row">
        <button class="archived-main" type="button">
          <span class="ritual-icon">🎯</span>
          <span class="ritual-info">
            <span class="ritual-name">Weekly review</span>
            <span class="ritual-meta">Focus <span class="meta-sep">·</span> Archived 15 Apr 2026</span>
          </span>
        </button>
        <button class="restore-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
          Restore
        </button>
      </div>
    </main>

    <button class="fab" type="button" aria-label="Talk to Strive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
        <path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>
      </svg>
    </button>

    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-item" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 13a2 2 0 0 0 2-2V7a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0V4a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0v-4a2 2 0 0 1 2-2"/></svg>
        <span class="nav-label">Rhythm</span>
      </button>
      <button class="nav-item active" type="button" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          <path d="M12 5 9.04 7.96a2.17 2.17 0 0 0 0 3.08v0c.82.82 2.13.85 3 .07l2.07-1.9a2.82 2.82 0 0 1 3.79 0l2.96 2.66"/>

        </svg>
        <span class="nav-label">Rituals</span>
      </button>
      <button class="nav-item" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="nav-label">Circles</span>
      </button>
    </nav>
  </div>

  <!-- STATE B — empty -->
  <div class="frame">
    <header class="page-header">
      <button class="back-btn" type="button" aria-label="Back to rituals">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <span class="header-title">Archived rituals</span>
    </header>
    <main class="content">
      <p class="empty">No archived rituals.</p>
    </main>

    <button class="fab" type="button" aria-label="Talk to Strive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
        <path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>
      </svg>
    </button>

    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-item" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 13a2 2 0 0 0 2-2V7a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0V4a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0v-4a2 2 0 0 1 2-2"/></svg>
        <span class="nav-label">Rhythm</span>
      </button>
      <button class="nav-item active" type="button" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>

      </button>
    </nav>
  </div>

<script>
  const root = document.documentElement;
  const isEmbedded = window.parent !== window;
  const isClean = new URLSearchParams(window.location.search).has("clean");
  if (isEmbedded || isClean) root.classList.add("embedded");
  const initial = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  root.dataset.theme = initial;
  document.querySelectorAll(".wf-controls [data-set-theme]").forEach((btn) => {
    btn.setAttribute("aria-pressed", btn.dataset.setTheme === initial ? "true" : "false");
    btn.addEventListener("click", () => {
      const t = btn.dataset.setTheme;
      root.dataset.theme = t;
      document.querySelectorAll(".wf-controls [data-set-theme]").forEach((b) => {
        b.setAttribute("aria-pressed", b.dataset.setTheme === t ? "true" : "false");
      });
    });
  });
</script>
</body>
</html>
