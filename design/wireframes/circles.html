<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Circles — Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --background: oklch(0.98 0.004 200);
    --foreground: oklch(0.28 0.005 200);
    --card: oklch(1 0 0);
    --card-foreground: oklch(0.28 0.005 200);
    --primary: oklch(0.20 0.005 200);
    --primary-foreground: oklch(0.985 0 0);
    --secondary: oklch(0.96 0.002 200);
    --muted: oklch(0.96 0.002 200);
    --muted-foreground: oklch(0.55 0.01 200);
    --accent: oklch(0.96 0.002 200);
    --border: oklch(0.92 0.002 200);
    --input: oklch(0.92 0.002 200);
    --ring: oklch(0.80 0.01 200);
    --momentum: oklch(0.62 0.12 154);
    --caution: oklch(0.68 0.14 72);
    --missed: oklch(0.62 0.17 27);
    --brand: oklch(0.78 0.07 75);
    --radius: 0.75rem;
    --radius-sm: calc(var(--radius) * 0.6);
    --radius-md: calc(var(--radius) * 0.8);
    --radius-lg: var(--radius);
    --radius-xl: calc(var(--radius) * 1.4);
    --radius-2xl: calc(var(--radius) * 1.8);
    --font-heading: "Sora", system-ui, sans-serif;
    --font-sans: "DM Sans", system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --background: oklch(0.18 0.006 200);
    --foreground: oklch(0.86 0.006 200);
    --card: oklch(0.22 0.006 200);
    --card-foreground: oklch(0.86 0.006 200);
    --primary: oklch(0.88 0.008 200);
    --primary-foreground: oklch(0.18 0.006 200);
    --secondary: oklch(0.26 0.006 200);
    --muted: oklch(0.26 0.006 200);
    --muted-foreground: oklch(0.62 0.01 200);
    --accent: oklch(0.26 0.006 200);
    --border: oklch(1 0 0 / 0.07);
    --input: oklch(1 0 0 / 0.09);
    --ring: oklch(0.40 0.01 200);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100dvh;
    transition: background 0.2s ease, color 0.2s ease;
  }
  body { display: flex; justify-content: center; padding: 0; }

  /* Wireframe theme switcher */
  .wf-controls {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 4px;
    font-size: 11px;
  }
  .wf-controls button {
    background: transparent;
    border: 0;
    color: var(--muted-foreground);
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font: inherit;
  }
  .wf-controls button[aria-pressed="true"] {
    background: var(--background);
    color: var(--foreground);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  /* Mobile-style frame */
  .frame {
    position: relative;
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--background);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* App header */
  .page-header {
    position: sticky;
    top: 0;
    z-index: 50;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: color-mix(in oklch, var(--background) 80%, transparent);
    backdrop-filter: blur(12px);
  }
  .brand {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: var(--foreground);
  }
  .avatar-btn {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    overflow: hidden;
    padding: 0;
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .avatar-btn svg { width: 100%; height: 100%; display: block; }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 22px 20px 112px;
  }

  /* Page title row */
  .page-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
    gap: 12px;
  }
  .page-title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--foreground);
  }
  .define-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 12px 7px 10px;
    border-radius: 999px;
    background: var(--foreground);
    color: var(--background);
    border: 0;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 11.5px;
    letter-spacing: 0.01em;
    cursor: pointer;
    flex-shrink: 0;
  }
  .define-pill svg { width: 12px; height: 12px; }

  /* Section */
  .section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted-foreground);
    padding: 0 4px 2px;
  }
  .section-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Circle card */
  .circle-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    color: inherit;
    font: inherit;
    transition: border-color 0.15s ease;
  }
  .circle-card:hover {
    border-color: color-mix(in oklch, var(--foreground) 20%, var(--border));
  }

  .cc-top { display: flex; align-items: flex-start; gap: 12px; }
  .cc-id { flex: 1; min-width: 0; }
  .circle-name {
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.01em;
    color: var(--foreground);
    line-height: 1.25;
  }
  .circle-desc {
    font-size: 12.5px;
    color: var(--muted-foreground);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .avatar-stack { display: inline-flex; flex-shrink: 0; }
  .stack-avatar,
  .stack-more {
    width: 34px;
    height: 34px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 12px;
    border: 2px solid var(--card);
    background: var(--accent);
    color: var(--foreground);
    margin-left: -8px;
  }
  .stack-avatar:first-child,
  .stack-more:first-child { margin-left: 0; }
  .stack-avatar.brand {
    background: linear-gradient(140deg, var(--brand), oklch(0.62 0.08 60));
    color: oklch(0.2 0.01 75);
  }
  .stack-more {
    background: var(--card);
    border: 1px dashed color-mix(in oklch, var(--muted-foreground) 35%, transparent);
    color: var(--muted-foreground);
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 10.5px;
  }

  .cc-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
  .ritual-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    border-radius: 999px;
    padding: 5px 10px 5px 7px;
    font-size: 11.5px;
    color: var(--foreground);
    white-space: nowrap;
  }
  .ritual-chip .emoji { font-size: 13px; line-height: 1; }
  .ritual-chip.more { color: var(--muted-foreground); padding: 5px 10px; }

  .cc-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .cc-members {
    font-size: 12px;
    color: var(--muted-foreground);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cc-momentum {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    font-size: 12px;
    flex-shrink: 0;
  }
  .cc-momentum .dot { width: 7px; height: 7px; border-radius: 999px; display: inline-block; }
  .cc-momentum.on-track { color: var(--momentum); }
  .cc-momentum.on-track .dot { background: var(--momentum); }
  .cc-momentum.steady { color: var(--caution); }
  .cc-momentum.steady .dot { background: var(--caution); }

  /* Floating action button — Strive AI */
  .fab {
    position: absolute;
    right: 20px;
    bottom: calc(64px + env(safe-area-inset-bottom) + 18px);
    width: 52px;
    height: 52px;
    border-radius: 999px;
    background: var(--foreground);
    color: var(--background);
    border: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 24px oklch(0 0 0 / 0.18), 0 2px 6px oklch(0 0 0 / 0.1);
    z-index: 40;
  }
  .fab svg { width: 22px; height: 22px; }

  /* Hide wireframe chrome when embedded */
  .embedded .wf-controls { display: none; }

  /* Bottom nav */
  .bottom-nav {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 64px;
    padding-bottom: env(safe-area-inset-bottom);
    border-top: 1px solid var(--border);
    background: color-mix(in oklch, var(--background) 80%, transparent);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-around;
  }
  .nav-item {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    min-width: 64px;
    min-height: 48px;
    color: var(--muted-foreground);
    background: transparent;
    border: 0;
    cursor: pointer;
    font: inherit;
    text-decoration: none;
  }
  .nav-item svg { width: 20px; height: 20px; }
  .nav-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .nav-item.active { color: var(--foreground); }
</style>
</head>
<body>
  <div class="wf-controls" role="group" aria-label="Wireframe theme">
    <button type="button" data-set-theme="light" aria-pressed="true">Light</button>
    <button type="button" data-set-theme="dark" aria-pressed="false">Dark</button>
  </div>

  <div class="frame">
    <header class="page-header">
      <span class="brand">Strive</span>
      <button class="avatar-btn" type="button" aria-label="Open profile">
        <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="1024" height="1024" fill="#272526"/>
          <g transform="translate(0,1024) scale(0.1,-0.1)">
            <g transform="translate(5138 5118) scale(1.2) translate(-5138 -5118)">
              <path fill="#cab695" stroke="none" fill-rule="evenodd"
                    d="M6717 6618 c-4 -169 -8 -212 -24 -258 -38 -104 -76 -165 -147 -236 -113 -113 -236 -164 -401 -164 -103 0 -178 19 -290 75 -99 49 -168 99 -385 280 -210 175 -277 227 -371 288 -161 104 -338 179 -457 194 -35 4 -49 9 -40 14 7 5 487 9 1067 9 l1054 0 -6 -202z M4261 6713 c-37 -23 -98 -74 -147 -126 -176 -184 -245 -420 -195 -661 56 -271 248 -512 582 -729 109 -72 311 -182 569 -312 511 -257 708 -398 839 -599 148 -228 137 -503 -29 -696 l-30 -35 21 49 c17 40 21 63 17 122 -13 195 -185 374 -513 535 -187 91 -390 161 -722 248 -251 66 -369 105 -478 157 -303 143 -528 409 -613 723 -23 86 -26 114 -26 276 0 166 2 188 27 279 96 345 305 598 622 752 127 62 168 71 76 17z M4359 6628 c-20 -35 -17 -155 5 -213 50 -131 180 -256 386 -372 82 -47 319 -145 460 -192 69 -23 238 -73 375 -111 282 -78 346 -100 486 -169 296 -147 502 -371 595 -648 87 -258 67 -574 -52 -832 -110 -238 -310 -436 -555 -550 -115 -53 -145 -61 -88 -22 67 45 175 147 219 206 50 68 93 154 122 245 32 105 33 290 0 403 -78 272 -281 497 -652 723 -52 31 -246 135 -430 229 -509 261 -647 350 -804 516 -135 143 -196 281 -196 438 0 124 27 214 98 323 36 55 56 73 31 26z M4295 4247 c146 -51 195 -82 435 -277 199 -162 346 -274 440 -337 152 -102 323 -172 465 -191 133 -18 -279 -25 -1180 -19 -506 4 -921 7 -922 7 -11 1 0 324 13 388 44 217 200 389 405 447 81 23 253 14 344 -18z"/>
            </g>
          </g>
        </svg>
      </button>
    </header>

    <main class="content">
      <div class="page-title-row">
        <h2 class="page-title">Circles</h2>
        <button class="define-pill" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          New circle
        </button>
      </div>

      <section class="section">
        <span class="section-label">My circles</span>
        <div class="section-list">

          <button class="circle-card" type="button">
            <div class="cc-top">
              <div class="cc-id">
                <div class="circle-name">Strive crew</div>
                <div class="circle-desc">Building rituals together.</div>
              </div>
              <div class="avatar-stack" aria-label="2 members">
                <span class="stack-avatar brand">S</span>
                <span class="stack-avatar">L</span>
              </div>
            </div>
            <div class="cc-strip">
              <span class="ritual-chip"><span class="emoji">🏋️</span> Musculation</span>
              <span class="ritual-chip"><span class="emoji">🪞</span> Skincare</span>
              <span class="ritual-chip"><span class="emoji">🪞</span> Skincare matin</span>
              <span class="ritual-chip more">+2</span>
            </div>
            <div class="cc-foot">
              <span class="cc-members">you · ljo</span>
              <span class="cc-momentum steady"><span class="dot"></span> Steady this week</span>
            </div>
          </button>

          <button class="circle-card" type="button">
            <div class="cc-top">
              <div class="cc-id">
                <div class="circle-name">Running crew</div>
                <div class="circle-desc">Saturday long runs, weekday easy miles.</div>
              </div>
              <div class="avatar-stack" aria-label="5 members">
                <span class="stack-avatar">P</span>
                <span class="stack-avatar">S</span>
                <span class="stack-avatar">L</span>
                <span class="stack-more" aria-hidden="true">+2</span>
              </div>
            </div>
            <div class="cc-strip">
              <span class="ritual-chip"><span class="emoji">🏃</span> Morning run</span>
              <span class="ritual-chip"><span class="emoji">🧘</span> Stretching</span>
              <span class="ritual-chip more">+1</span>
            </div>
            <div class="cc-foot">
              <span class="cc-members">Pierre · Sarah · you +2</span>
              <span class="cc-momentum on-track"><span class="dot"></span> 4 of 5 this week</span>
            </div>
          </button>

        </div>
      </section>
    </main>

    <button class="fab" type="button" aria-label="Talk to Strive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
        <path d="M20 3v4"/>
        <path d="M22 5h-4"/>
        <path d="M4 17v2"/>
        <path d="M5 18H3"/>
      </svg>
    </button>

    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-item" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 13a2 2 0 0 0 2-2V7a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0V4a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0v-4a2 2 0 0 1 2-2"/>
        </svg>
        <span class="nav-label">Rhythm</span>
      </button>
      <button class="nav-item" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
        </svg>
        <span class="nav-label">Rituals</span>
      </button>
      <button class="nav-item active" type="button" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span class="nav-label">Circles</span>
      </button>
    </nav>
  </div>

<script>
  const root = document.documentElement;
  const isEmbedded = window.parent !== window;
  const isClean = new URLSearchParams(window.location.search).has("clean");
  if (isEmbedded || isClean) root.classList.add("embedded");
  const initial = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  root.dataset.theme = initial;
  document.querySelectorAll(".wf-controls [data-set-theme]").forEach((btn) => {
    btn.setAttribute("aria-pressed", btn.dataset.setTheme === initial ? "true" : "false");
    btn.addEventListener("click", () => {
      const t = btn.dataset.setTheme;
      root.dataset.theme = t;
      document.querySelectorAll(".wf-controls [data-set-theme]").forEach((b) => {
        b.setAttribute("aria-pressed", b.dataset.setTheme === t ? "true" : "false");
      });
    });
  });
</script>
</body>
</html>
