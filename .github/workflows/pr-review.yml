name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx eslint . --max-warnings 0

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx next build

  test:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  agent-review:
    name: AI Code Review
    needs: [typescript, lint, build, test]
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: read
      pull-requests: write
      models: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin "${{ github.base_ref }}"
          # -U8: extra context lines so the reviewer can judge the surrounding code
          # without us shipping whole files (keeps within the model context budget).
          # Generated types are excluded as noise.
          DIFF=$(git diff -U8 "origin/${{ github.base_ref }}...HEAD" -- \
            '*.ts' '*.tsx' '*.sql' '*.css' \
            ':!*.lock' ':!lib/supabase/database.types.ts')
          # Cap the diff to fit the model context (GitHub Models free tier).
          MAX_CHARS=40000
          if [ ${#DIFF} -gt $MAX_CHARS ]; then
            DIFF="${DIFF:0:$MAX_CHARS}

          [diff truncated at ${MAX_CHARS} characters — review only the portion shown]"
          fi
          # Random delimiter so a literal 'EOF' line inside the diff can't break output.
          DELIM="DIFF_EOF_$(date +%s)_${RANDOM}"
          {
            echo "diff<<${DELIM}"
            echo "$DIFF"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"
          # Flag whether there is any reviewable code change, so we can skip the
          # model call (and avoid empty/filler reviews) when there is none.
          if [ -n "$(printf '%s' "$DIFF" | tr -d '[:space:]')" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Load system prompt
        id: prompt
        run: |
          PROMPT=$(cat .github/prompts/strive-pr-reviewer.md)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run AI review
        id: review
        # Skip the model call entirely when the PR has no reviewable code change.
        if: steps.diff.outputs.has_diff == 'true'
        # A model hiccup (rate limit, content filter, transient error) must not fail
        # the check or block the PR — handle it gracefully in the next step.
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          # Instruction-following model (GitHub Models). gpt-4o-mini balances quality
          # vs free-tier quota; bump to openai/gpt-4.1 or openai/gpt-4o if quota allows.
          model: openai/gpt-4o-mini
          system-prompt: ${{ steps.prompt.outputs.content }}
          prompt: |
            PR: ${{ github.event.pull_request.title }}

            CI status: TypeScript (strict), ESLint, the Next.js build and the Vitest
            suite have ALL PASSED for this PR. Do NOT report type errors, lint
            violations, build failures, or failing tests — CI already owns those.

            Review the unified diff below using the rules in your system prompt. You can
            see ONLY this diff, not the full files. Only raise a finding for a line shown
            as an addition (prefixed with "+"), and quote that exact line in the finding.
            If you cannot quote a real added line, do not raise it.

            ${{ steps.diff.outputs.diff }}
          token: ${{ github.token }}
          max-tokens: 1500
          temperature: 0

      - name: Post review comment
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        env:
          REVIEW_DATA: ${{ steps.review.outputs.response }}
        with:
          script: |
            // Hidden marker lets us update a single comment across pushes instead
            // of stacking a new one on every `synchronize`.
            const marker = "<!-- strive-pr-agent -->";
            const review = (process.env.REVIEW_DATA || "").trim();
            const content = review
              ? review
              : "_The review could not be generated for this run (model unavailable or rate-limited). Push again to retry._";
            const body = `## Strive PR Agent Review\n${marker}\n\n${content}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (c) => c.body && c.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }