name: Strive Project Audit

on:
  workflow_dispatch:
    inputs:
      focus_area:
        description: "Audit focus (leave blank for full audit)"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - documentation
          - architecture
          - code-quality
          - pwa-design-system
          - ai-agent

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      models: read

    steps:
      - uses: actions/checkout@v4

      - name: Build codebase snapshot
        id: snapshot
        run: |
          SNAPSHOT=$(find app components lib docs -type f \( \
            -name "*.ts" \
            -o -name "*.tsx" \
            -o -name "*.md" \
            -o -name "*.sql" \
            -o -name "*.css" \
          \) \
            | grep -v "node_modules" \
            | grep -v "__tests__" \
            | grep -v ".next" \
            | sort \
            | xargs awk 'FNR==1{print "\n\n--- FILE: " FILENAME " ---"}1' \
          )
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$SNAPSHOT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Load system prompt
        id: prompt
        run: |
          PROMPT=$(cat .github/prompts/strive-project-reviewer.md)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run audit
        id: audit
        uses: actions/ai-inference@v1
        with:
          model: mistral-ai/Codestral-2501
          system-prompt: ${{ steps.prompt.outputs.content }}
          prompt: |
            Focus for this run: ${{ github.event.inputs.focus_area }}

            When focus is not "full", prioritize the relevant audit pillar but still flag
            any critical issues found in other areas.

            Full codebase snapshot:

            ${{ steps.snapshot.outputs.content }}
          token: ${{ secrets.GITHUB_TOKEN }}
          max-tokens: 4000

      - name: Create audit issue
        uses: actions/github-script@v7
        env:
          AUDIT_OUTPUT: ${{ steps.audit.outputs.response }}
        with:
          script: |
            const focus = '${{ github.event.inputs.focus_area }}';
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Audit [${focus}] — ${date}`,
              body: [
                `**Focus:** ${focus}`,
                `**Triggered by:** @${context.actor}`,
                `**Run:** ${runUrl}`,
                '',
                '---',
                '',
                process.env.AUDIT_OUTPUT
              ].join('\n'),
              labels: ['documentation']
            });