<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Arc — Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --background: oklch(0.98 0.004 200);
    --foreground: oklch(0.28 0.005 200);
    --card: oklch(1 0 0);
    --card-foreground: oklch(0.28 0.005 200);
    --primary: oklch(0.20 0.005 200);
    --primary-foreground: oklch(0.985 0 0);
    --secondary: oklch(0.96 0.002 200);
    --muted: oklch(0.96 0.002 200);
    --muted-foreground: oklch(0.55 0.01 200);
    --accent: oklch(0.96 0.002 200);
    --border: oklch(0.92 0.002 200);
    --input: oklch(0.92 0.002 200);
    --ring: oklch(0.80 0.01 200);
    --momentum: oklch(0.62 0.12 154);
    --caution: oklch(0.68 0.14 72);
    --missed: oklch(0.62 0.17 27);
    --radius: 0.75rem;
    --radius-sm: calc(var(--radius) * 0.6);
    --radius-md: calc(var(--radius) * 0.8);
    --radius-lg: var(--radius);
    --radius-xl: calc(var(--radius) * 1.4);
    --radius-2xl: calc(var(--radius) * 1.8);
    --font-heading: "Sora", system-ui, sans-serif;
    --font-sans: "DM Sans", system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --background: oklch(0.18 0.006 200);
    --foreground: oklch(0.86 0.006 200);
    --card: oklch(0.22 0.006 200);
    --card-foreground: oklch(0.86 0.006 200);
    --primary: oklch(0.88 0.008 200);
    --primary-foreground: oklch(0.18 0.006 200);
    --secondary: oklch(0.26 0.006 200);
    --muted: oklch(0.26 0.006 200);
    --muted-foreground: oklch(0.62 0.01 200);
    --accent: oklch(0.26 0.006 200);
    --border: oklch(1 0 0 / 0.07);
    --input: oklch(1 0 0 / 0.09);
    --ring: oklch(0.40 0.01 200);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100dvh;
    transition: background 0.2s ease, color 0.2s ease;
  }
  body {
    display: flex;
    justify-content: center;
    padding: 0;
  }

  /* Wireframe theme switcher */
  .wf-controls {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 4px;
    font-size: 11px;
  }
  .wf-controls button {
    background: transparent;
    border: 0;
    color: var(--muted-foreground);
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font: inherit;
  }
  .wf-controls button[aria-pressed="true"] {
    background: var(--background);
    color: var(--foreground);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  /* Mobile-style frame */
  .frame {
    position: relative;
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--background);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* App header */
  .page-header {
    position: sticky;
    top: 0;
    z-index: 50;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    background: color-mix(in oklch, var(--background) 80%, transparent);
    backdrop-filter: blur(12px);
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: transparent;
    border: 0;
    color: var(--foreground);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { background: var(--accent); }
  .icon-btn svg { width: 20px; height: 20px; }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 20px 20px 112px;
  }

  /* Hero bar (ritual identity + quick log) — button aligns to bottom (coach line) */
  .day-bar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    padding: 0 4px 4px;
  }
  .day-bar-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .day-title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--foreground);
    line-height: 1.2;
  }
  .day-coach {
    font-size: 13px;
    color: var(--muted-foreground);
    letter-spacing: 0.01em;
    font-weight: 500;
    line-height: 1.4;
  }

  /* Quick log button — outline circle (no log today) */
  .btn-log {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    border: 1.5px solid color-mix(in oklch, var(--muted-foreground) 35%, transparent);
    background: transparent;
    color: var(--muted-foreground);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .btn-log svg { width: 15px; height: 15px; }
  .btn-log:hover {
    border-color: var(--foreground);
    color: var(--foreground);
  }

  /* Stepper (after first log today) — achromatic */
  .stepper {
    display: inline-flex;
    align-items: center;
    height: 32px;
    border-radius: 999px;
    background: var(--accent);
    border: 1px solid var(--border);
    color: var(--foreground);
    flex-shrink: 0;
    overflow: hidden;
  }
  .stepper button {
    width: 28px;
    height: 100%;
    background: transparent;
    border: 0;
    color: var(--foreground);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .stepper button:hover { background: color-mix(in oklch, var(--foreground) 6%, transparent); }
  .stepper button svg { width: 12px; height: 12px; stroke-width: 2.25; }
  .stepper .count {
    min-width: 18px;
    text-align: center;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: -0.02em;
    padding: 0 2px;
    color: var(--foreground);
  }

  /* KPI strip */
  .kpi-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .kpi-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted-foreground);
  }
  .kpi-value {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--foreground);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .kpi-trend {
    width: 16px;
    height: 16px;
    color: var(--momentum);
    flex-shrink: 0;
  }
  .kpi-trend.down { color: var(--missed); }
  .kpi-trend.flat { color: var(--muted-foreground); }

  /* Combined Arc card (chart + drill-down heatmap) */
  .arc-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .arc-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .arc-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px;
  }
  .arc-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted-foreground);
  }
  .arc-meta {
    font-size: 11px;
    font-weight: 600;
    color: var(--foreground);
    letter-spacing: 0.04em;
  }
  .arc-divider {
    height: 1px;
    background: var(--border);
    margin: 0 -16px;
  }

  /* Area curve SVG (wrapped so we can overlay a target label) */
  .arc-svg-wrap {
    position: relative;
  }
  .arc-svg {
    width: 100%;
    height: 96px;
    display: block;
    color: var(--foreground);
    overflow: visible;
  }
  .arc-target {
    stroke: currentColor;
    stroke-width: 1;
    stroke-dasharray: 4 4;
    opacity: 0.22;
  }
  .arc-target-label {
    position: absolute;
    /* Sits just above the dashed target line (line at ~16px display y) */
    top: 2px;
    right: 0;
    font-size: 9px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted-foreground);
    pointer-events: none;
  }
  .arc-area { fill: url(#arcFill); }
  .arc-line {
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.6;
  }
  .arc-guide {
    stroke: currentColor;
    stroke-width: 1;
    stroke-dasharray: 2 3;
    opacity: 0.3;
  }
  .arc-point {
    fill: currentColor;
    opacity: 0.45;
  }
  .arc-point.selected {
    opacity: 1;
  }
  .arc-point-ring {
    fill: none;
    stroke: currentColor;
    stroke-width: 1;
    opacity: 0.25;
  }
  .arc-axis {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--muted-foreground);
    text-transform: uppercase;
  }

  /* Week heatmap */
  .heatmap {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .day-cell {
    background: var(--background);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 11px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .day-letter {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--muted-foreground);
    text-transform: uppercase;
  }
  .day-dot {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    background: color-mix(in oklch, var(--foreground) 12%, transparent);
  }
  .day-cell.logged .day-dot { background: var(--foreground); }
  .day-cell.logged .day-letter { color: var(--foreground); }
  .day-cell.rest .day-dot {
    background: transparent;
    border: 1px dashed color-mix(in oklch, var(--muted-foreground) 35%, transparent);
  }
  .day-cell.today {
    border-color: color-mix(in oklch, var(--foreground) 35%, transparent);
    background: color-mix(in oklch, var(--foreground) 4%, var(--card));
  }
  .day-cell.today .day-letter { color: var(--foreground); }
  .day-cell.today .day-dot {
    background: transparent;
    border: 1.5px solid color-mix(in oklch, var(--foreground) 50%, transparent);
  }
  .day-cell.future .day-dot {
    background: transparent;
    border: 1px dashed color-mix(in oklch, var(--muted-foreground) 18%, transparent);
  }
  .day-cell.future .day-letter {
    color: color-mix(in oklch, var(--muted-foreground) 55%, transparent);
  }

  /* Floating action button — Strive AI */
  .fab {
    position: absolute;
    right: 20px;
    bottom: calc(64px + env(safe-area-inset-bottom) + 18px);
    width: 52px;
    height: 52px;
    border-radius: 999px;
    background: var(--foreground);
    color: var(--background);
    border: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 24px oklch(0 0 0 / 0.18), 0 2px 6px oklch(0 0 0 / 0.1);
    z-index: 40;
  }
  .fab svg { width: 22px; height: 22px; }

  /* Hide wireframe chrome when embedded */
  .embedded .wf-controls { display: none; }

  /* Bottom nav */
  .bottom-nav {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 64px;
    padding-bottom: env(safe-area-inset-bottom);
    border-top: 1px solid var(--border);
    background: color-mix(in oklch, var(--background) 80%, transparent);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-around;
  }
  .nav-item {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    min-width: 64px;
    min-height: 48px;
    color: var(--muted-foreground);
    background: transparent;
    border: 0;
    cursor: pointer;
    font: inherit;
    text-decoration: none;
  }
  .nav-item svg { width: 20px; height: 20px; }
  .nav-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .nav-item.active { color: var(--foreground); }
</style>
</head>
<body>
  <div class="wf-controls" role="group" aria-label="Wireframe theme">
    <button type="button" data-set-theme="light" aria-pressed="true">Light</button>
    <button type="button" data-set-theme="dark" aria-pressed="false">Dark</button>
  </div>

  <div class="frame">
    <header class="page-header">
      <button class="icon-btn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <button class="icon-btn" type="button" aria-label="More options">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5" cy="12" r="1"/>
          <circle cx="12" cy="12" r="1"/>
          <circle cx="19" cy="12" r="1"/>
        </svg>
      </button>
    </header>

    <main class="content">
      <div class="day-bar">
        <div class="day-bar-text">
          <h2 class="day-title">Morning run</h2>
          <span class="day-coach">5× per week</span>
        </div>
        <!-- Quick log: today not yet logged (matches Sa=today empty ring in heatmap) -->
        <button class="btn-log" type="button" aria-label="Log Morning run">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>
      </div>

      <!-- KPI strip: 2 cards -->
      <div class="kpi-strip">
        <div class="kpi-card">
          <span class="kpi-label">Momentum</span>
          <span class="kpi-value">
            Strong
            <svg class="kpi-trend" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M7 7h10v10"/>
              <path d="M7 17 17 7"/>
            </svg>
          </span>
        </div>
        <div class="kpi-card">
          <span class="kpi-label">Started</span>
          <span class="kpi-value">Sep 17</span>
        </div>
      </div>

      <!-- The Arc card: chart + drill-down heatmap, separated by divider -->
      <div class="arc-card">
        <div class="arc-section">
          <div class="arc-head">
            <span class="arc-label">The Arc · 12 weeks</span>
          </div>
          <div class="arc-svg-wrap">
            <svg class="arc-svg" viewBox="0 0 330 100" preserveAspectRatio="none" role="img" aria-label="Weekly run count over the last 12 weeks">
              <defs>
                <linearGradient id="arcFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="currentColor" stop-opacity="0.18"/>
                  <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <!-- Target line at 5× per week (y=17 on a 0–6 scale) -->
              <line class="arc-target" x1="0" y1="17" x2="330" y2="17"/>
              <!-- Area fill (counts: 2,3,4,5,3,5,5,5,6,4,5,3) -->
              <path class="arc-area" d="M 0,67 C 15,67 15,50 30,50 C 45,50 45,33 60,33 C 75,33 75,17 90,17 C 105,17 105,50 120,50 C 135,50 135,17 150,17 C 165,17 165,17 180,17 C 195,17 195,17 210,17 C 225,17 225,0 240,0 C 255,0 255,33 270,33 C 285,33 285,17 300,17 C 315,17 315,50 330,50 L 330,100 L 0,100 Z"/>
              <!-- Curve line -->
              <path class="arc-line" d="M 0,67 C 15,67 15,50 30,50 C 45,50 45,33 60,33 C 75,33 75,17 90,17 C 105,17 105,50 120,50 C 135,50 135,17 150,17 C 165,17 165,17 180,17 C 195,17 195,17 210,17 C 225,17 225,0 240,0 C 255,0 255,33 270,33 C 285,33 285,17 300,17 C 315,17 315,50 330,50"/>
              <!-- Selected week guide line -->
              <line class="arc-guide" x1="330" y1="50" x2="330" y2="100"/>
              <!-- 12 weekly data points snapped to integer counts -->
              <circle class="arc-point" cx="0"   cy="67" r="2"/>
              <circle class="arc-point" cx="30"  cy="50" r="2"/>
              <circle class="arc-point" cx="60"  cy="33" r="2"/>
              <circle class="arc-point" cx="90"  cy="17" r="2"/>
              <circle class="arc-point" cx="120" cy="50" r="2"/>
              <circle class="arc-point" cx="150" cy="17" r="2"/>
              <circle class="arc-point" cx="180" cy="17" r="2"/>
              <circle class="arc-point" cx="210" cy="17" r="2"/>
              <circle class="arc-point" cx="240" cy="0"  r="2"/>
              <circle class="arc-point" cx="270" cy="33" r="2"/>
              <circle class="arc-point" cx="300" cy="17" r="2"/>
              <!-- Selected point (current week, 3 logs so far) with halo -->
              <circle class="arc-point-ring" cx="330" cy="50" r="6"/>
              <circle class="arc-point selected" cx="330" cy="50" r="3.5"/>
            </svg>
            <span class="arc-target-label">5×</span>
          </div>
          <div class="arc-axis">
            <span>Feb 17</span>
            <span>May 11</span>
          </div>
        </div>

        <div class="arc-divider"></div>

        <div class="arc-section">
          <div class="arc-head">
            <span class="arc-label">Week of May 11</span>
            <span class="arc-meta">3 of 5</span>
          </div>
          <div class="heatmap" aria-label="Day-by-day breakdown of the selected week">
            <div class="day-cell logged"><span class="day-letter">Mo</span><span class="day-dot"></span></div>
            <div class="day-cell rest"><span class="day-letter">Tu</span><span class="day-dot"></span></div>
            <div class="day-cell logged"><span class="day-letter">We</span><span class="day-dot"></span></div>
            <div class="day-cell rest"><span class="day-letter">Th</span><span class="day-dot"></span></div>
            <div class="day-cell logged"><span class="day-letter">Fr</span><span class="day-dot"></span></div>
            <div class="day-cell today"><span class="day-letter">Sa</span><span class="day-dot"></span></div>
            <div class="day-cell future"><span class="day-letter">Su</span><span class="day-dot"></span></div>
          </div>
        </div>
      </div>
    </main>

    <!-- FAB: Strive AI -->
    <button class="fab" type="button" aria-label="Talk to Strive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
        <path d="M20 3v4"/>
        <path d="M22 5h-4"/>
        <path d="M4 17v2"/>
        <path d="M5 18H3"/>
      </svg>
    </button>

    <!-- Bottom nav: Rituals active (The Arc = ritual detail) -->
    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-item" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 13a2 2 0 0 0 2-2V7a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0V4a2 2 0 0 1 4 0v13a2 2 0 0 0 4 0v-4a2 2 0 0 1 2-2"/>
        </svg>
        <span class="nav-label">Rhythm</span>
      </button>
      <button class="nav-item active" type="button" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          <path d="M12 5 9.04 7.96a2.17 2.17 0 0 0 0 3.08v0c.82.82 2.13.85 3 .07l2.07-1.9a2.82 2.82 0 0 1 3.79 0l2.96 2.66"/>
          <path d="m18 15-2-2"/>
          <path d="m15 18-2-2"/>
        </svg>

<script>
  const root = document.documentElement;
  const isEmbedded = window.parent !== window;
  const isClean = new URLSearchParams(window.location.search).has("clean");
  if (isEmbedded || isClean) root.classList.add("embedded");
  const initial = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  root.dataset.theme = initial;
  document.querySelectorAll(".wf-controls [data-set-theme]").forEach((btn) => {
    btn.setAttribute("aria-pressed", btn.dataset.setTheme === initial ? "true" : "false");
    btn.addEventListener("click", () => {
      const t = btn.dataset.setTheme;
      root.dataset.theme = t;
      document.querySelectorAll(".wf-controls [data-set-theme]").forEach((b) => {
        b.setAttribute("aria-pressed", b.dataset.setTheme === t ? "true" : "false");
      });
    });
  });
</script>
