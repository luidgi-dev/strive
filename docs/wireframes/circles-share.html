<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Circle created · share invite — Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<!--
  POST-CREATE STATE.
  This wireframe is the next modal after circles-create.html. After the user
  taps "Create circle" and the API returns success, the create modal transitions
  (or is replaced) by this share state. Goal: invite people immediately, while
  the intent is fresh.

  Schema on entry:
    - circles row exists (just-created)
    - circle_members has one row (owner)
    - circle_invitations has one row (token, expires_at = now + 7 days, max_uses = 8)
      generated automatically right after circle creation

  Link policy (per Claude Web cadrage):
    - PERMANENT by default (just expires_at + max_uses cap, no single-use)
    - Owner can reset/rotate from circle-detail's ··· menu if compromised
    - Cap members NOT displayed visually (3/8 creates fill-up anxiety,
      anti-Strive). The cap exists in DB (max_uses) but is silent in UI.
-->
<style>
  :root {
    --background: oklch(0.98 0.004 200);
    --foreground: oklch(0.28 0.005 200);
    --card: oklch(1 0 0);
    --card-foreground: oklch(0.28 0.005 200);
    --primary: oklch(0.20 0.005 200);
    --primary-foreground: oklch(0.985 0 0);
    --secondary: oklch(0.96 0.002 200);
    --muted: oklch(0.96 0.002 200);
    --muted-foreground: oklch(0.55 0.01 200);
    --accent: oklch(0.96 0.002 200);
    --border: oklch(0.92 0.002 200);
    --input: oklch(0.92 0.002 200);
    --ring: oklch(0.80 0.01 200);
    --momentum: oklch(0.62 0.12 154);
    --caution: oklch(0.68 0.14 72);
    --missed: oklch(0.62 0.17 27);
    --radius: 0.75rem;
    --radius-sm: calc(var(--radius) * 0.6);
    --radius-md: calc(var(--radius) * 0.8);
    --radius-lg: var(--radius);
    --radius-xl: calc(var(--radius) * 1.4);
    --radius-2xl: calc(var(--radius) * 1.8);
    --font-heading: "Sora", system-ui, sans-serif;
    --font-sans: "DM Sans", system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --background: oklch(0.18 0.006 200);
    --foreground: oklch(0.86 0.006 200);
    --card: oklch(0.22 0.006 200);
    --card-foreground: oklch(0.86 0.006 200);
    --primary: oklch(0.88 0.008 200);
    --primary-foreground: oklch(0.18 0.006 200);
    --secondary: oklch(0.26 0.006 200);
    --muted: oklch(0.26 0.006 200);
    --muted-foreground: oklch(0.62 0.01 200);
    --accent: oklch(0.26 0.006 200);
    --border: oklch(1 0 0 / 0.07);
    --input: oklch(1 0 0 / 0.09);
    --ring: oklch(0.40 0.01 200);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100dvh;
    transition: background 0.2s ease, color 0.2s ease;
  }
  body { display: flex; justify-content: center; padding: 0; }

  /* Wireframe theme switcher */
  .wf-controls {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 4px;
    font-size: 11px;
  }
  .wf-controls button {
    background: transparent;
    border: 0;
    color: var(--muted-foreground);
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font: inherit;
  }
  .wf-controls button[aria-pressed="true"] {
    background: var(--background);
    color: var(--foreground);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  /* Mobile-style frame */
  .frame {
    position: relative;
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--background);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  /* Faded Circles backdrop */
  .circles-backdrop {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    filter: blur(3px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 1;
  }
  .bg-header {
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
  }
  .bg-brand {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: var(--foreground);
  }
  .bg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    background: var(--muted);
    border: 1px solid var(--border);
  }
  .bg-main {
    flex: 1;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .bg-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }
  .bg-title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--foreground);
  }
  .bg-pill {
    width: 100px;
    height: 30px;
    border-radius: 999px;
    background: var(--foreground);
    opacity: 0.85;
  }
  .bg-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    height: 70px;
    flex-shrink: 0;
  }
  .backdrop-overlay {
    position: absolute;
    inset: 0;
    background: color-mix(in oklch, var(--background) 25%, transparent);
    pointer-events: none;
    z-index: 2;
  }

  /* Bottom sheet (compact, share state) */
  .sheet {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 60%;
    background: var(--card);
    border-top-left-radius: var(--radius-2xl);
    border-top-right-radius: var(--radius-2xl);
    display: flex;
    flex-direction: column;
    z-index: 10;
    box-shadow: 0 -16px 40px oklch(0 0 0 / 0.25), 0 -4px 12px oklch(0 0 0 / 0.14);
    overflow: hidden;
  }
  .sheet-handle {
    align-self: center;
    width: 36px;
    height: 4px;
    border-radius: 999px;
    background: color-mix(in oklch, var(--muted-foreground) 30%, transparent);
    margin: 9px 0 0;
    flex-shrink: 0;
  }
  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 8px 14px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    background: transparent;
    border: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { background: var(--accent); color: var(--foreground); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* Content hero */
  .share-content {
    flex: 1;
    overflow-y: auto;
    padding: 8px 22px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
  }
  .check-icon {
    width: 56px;
    height: 56px;
    border-radius: 999px;
    background: color-mix(in oklch, var(--momentum) 15%, var(--card));
    color: var(--momentum);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 6px;
  }
  .check-icon svg { width: 28px; height: 28px; stroke-width: 2.25; }
  .share-title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--foreground);
    line-height: 1.2;
  }
  .share-subtitle {
    font-family: var(--font-sans);
    font-size: 13.5px;
    color: var(--muted-foreground);
    line-height: 1.55;
    max-width: 280px;
    margin-bottom: 4px;
  }

  /* Invite link field */
  .link-field-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 4px;
  }
  .link-field {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--accent);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 4px 4px 4px 14px;
  }
  .link-field-url {
    flex: 1;
    background: transparent;
    border: 0;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--foreground);
    outline: none;
    padding: 8px 0;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
    min-width: 0;
  }
  .link-field-copy {
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--foreground);
    color: var(--background);
    border: 0;
    font: inherit;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.01em;
    cursor: pointer;
    flex-shrink: 0;
  }
  .link-hint {
    font-size: 11px;
    color: var(--muted-foreground);
    padding: 0 4px;
    text-align: left;
  }

  /* Sticky CTA bar */
  .cta-bar {
    padding: 10px 20px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--card);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }
  .cta-primary {
    width: 100%;
    padding: 13px 16px;
    border: 0;
    border-radius: 999px;
    background: var(--foreground);
    color: var(--background);
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.01em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .cta-primary svg { width: 15px; height: 15px; }
  .cta-secondary {
    background: transparent;
    border: 0;
    color: var(--muted-foreground);
    cursor: pointer;
    font: inherit;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 13px;
    padding: 6px 12px;
    letter-spacing: 0.005em;
  }
  .cta-secondary:hover { color: var(--foreground); }

  /* Hide wireframe chrome when embedded */
  .embedded .wf-controls { display: none; }
</style>
</head>
<body>
  <div class="wf-controls" role="group" aria-label="Wireframe theme">
    <button type="button" data-set-theme="light" aria-pressed="true">Light</button>
    <button type="button" data-set-theme="dark" aria-pressed="false">Dark</button>
  </div>

  <div class="frame">
    <!-- Faded Circles backdrop (same as create modal — same context) -->
    <div class="circles-backdrop" aria-hidden="true">
      <header class="bg-header">
        <span class="bg-brand">Strive</span>
        <span class="bg-avatar"></span>
      </header>
      <main class="bg-main">
        <div class="bg-title-row">
          <span class="bg-title">Circles</span>
          <span class="bg-pill"></span>
        </div>
        <div class="bg-card"></div>
        <div class="bg-card"></div>
      </main>
    </div>
    <div class="backdrop-overlay" aria-hidden="true"></div>

    <!-- Bottom sheet (compact, post-create share state) -->
    <section class="sheet" role="dialog" aria-labelledby="share-title">
      <div class="sheet-handle" aria-hidden="true"></div>
      <header class="sheet-header">
        <button class="icon-btn" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/>
            <path d="m6 6 12 12"/>
          </svg>
        </button>
      </header>

      <div class="share-content">
        <div class="check-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
        </div>
        <h2 class="share-title" id="share-title">Running crew is ready.</h2>
        <p class="share-subtitle">Share this link with people you'd like to keep rhythm with.</p>

        <div class="link-field-wrap">
          <div class="link-field">
            <input type="text" class="link-field-url" value="striveapp.cc/i/r3X8z2" readonly aria-label="Invite link" />
            <button class="link-field-copy" type="button">Copy</button>
          </div>
          <span class="link-hint">Anyone with the link can join. Expires in 7 days.</span>
        </div>
      </div>

      <div class="cta-bar">
        <button class="cta-primary" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          Share invite link
        </button>
        <button class="cta-secondary" type="button">Done, invite later</button>
      </div>
    </section>
  </div>

<script>
  const root = document.documentElement;
  const isEmbedded = window.parent !== window;
  const isClean = new URLSearchParams(window.location.search).has("clean");
  if (isEmbedded || isClean) root.classList.add("embedded");
  const initial = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  root.dataset.theme = initial;
  document.querySelectorAll(".wf-controls [data-set-theme]").forEach((btn) => {
    btn.setAttribute("aria-pressed", btn.dataset.setTheme === initial ? "true" : "false");
    btn.addEventListener("click", () => {
      const t = btn.dataset.setTheme;
      root.dataset.theme = t;
      document.querySelectorAll(".wf-controls [data-set-theme]").forEach((b) => {
        b.setAttribute("aria-pressed", b.dataset.setTheme === t ? "true" : "false");
      });
    });
  });
</script>
</body>
</html>
